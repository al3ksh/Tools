services:
  # API server (serves web UI on port 3000)
  api:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3001"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - PORT=3001
      - NODE_OPTIONS=--max-old-space-size=768
    restart: unless-stopped
    mem_limit: 1g
    cpus: 2
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    tmpfs:
      - /tmp
      - /root/.npm
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - NODE_OPTIONS=--max-old-space-size=1536
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 2g
    cpus: 4
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    tmpfs:
      - /tmp
      - /root/.npm
    healthcheck:
      test: ["CMD-SHELL", "node -e \"try { require('better-sqlite3')('/data/tools.db').prepare('SELECT 1').get(); process.exit(0) } catch(e) { process.exit(1) }\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  data:
