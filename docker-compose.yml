services:
  # API server (serves web UI on port 3000)
  api:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3001"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - PORT=3001
    restart: unless-stopped
    mem_limit: 1g
    cpus: 2
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 2g
    cpus: 4
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  data:
